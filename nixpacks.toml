# nixpacks.toml

[phases.setup]
# Instalar dependencias necesarias
apt_pkgs = ["nginx", "php8.3-fpm", "php8.3-cli", "php8.3-mysql", "php8.3-xml", "php8.3-curl", "php8.3-mbstring", "php8.3-bcmath", "php8.3-zip", "composer", "nodejs", "npm"]

[phases.install]
# Instalar dependencias de Laravel y React
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install --prefix frontend",
  "npm run build --prefix frontend"
]

[phases.build]
# Copiar build de React al public de Laravel
cmds = [
  "cp -r frontend/build/* public/"
]

[start]
# Procesos que deben correr
cmd = "supervisord -c /etc/supervisor/conf.d/supervisord.conf"

[processes]
# PHP-FPM
php = "php-fpm8.3 -F"

# Nginx
nginx = "nginx -g 'daemon off;'"

# Worker de colas Laravel
queue = "php artisan queue:work --verbose --tries=3 --timeout=90"

# Scheduler de Laravel
scheduler = "php artisan schedule:run"
